worker_processes auto;

events {
  worker_connections 1024;
}

http {
  include      /etc/nginx/mime.types;
  default_type application/octet-stream;
  sendfile     on;

  # Allow larger uploads (documents, spreadsheets)
  client_max_body_size 50M;

  upstream app {
    server web:3000;
  }

  upstream storage {
    server minio:9000;
  }

  server {
    listen 80;
    server_name _;

    # ── MinIO storage proxy ────────────────────────────────────────────────────
    # Browsers access pre-signed URLs via /storage/...
    # nginx strips the /storage prefix and forwards to MinIO.
    #
    # IMPORTANT: Host is set to the internal MinIO address so that pre-signed
    # URL signatures (which were generated against minio:9000) remain valid.
    location /storage/ {
      rewrite ^/storage/(.*) /$1 break;
      proxy_pass         http://storage;
      proxy_set_header   Host              minio:9000;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_buffering    off;
      proxy_request_buffering off;
    }

    # ── Gavel web app ──────────────────────────────────────────────────────────
    location / {
      proxy_pass         http://app;
      proxy_http_version 1.1;
      proxy_set_header   Upgrade           $http_upgrade;
      proxy_set_header   Connection        "upgrade";
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_cache_bypass $http_upgrade;
      proxy_read_timeout 60s;
    }
  }
}
